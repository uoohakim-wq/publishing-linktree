<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>퍼블리싱팀 링크 트리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-top:#F4F7FC; --bg-bot:#E7ECF5;
    --surface:#FFFFFF; --ink:#12141C; --muted:#6C7486; --faint:#98A0B1;
    --line:#E5E9F1; --line-strong:#D2D9E6;
    --accent:#2E5BFF; --accent-ink:#1E3FCC; --accent-soft:#EDF1FF;
    --live:#FF4D4D; --warn:#D97706;
    --radius:16px;
    --shadow-sm:0 1px 2px rgba(20,25,40,.04), 0 1px 3px rgba(20,25,40,.06);
    --shadow-lift:0 12px 26px -10px rgba(46,91,255,.28), 0 6px 12px -6px rgba(20,25,40,.10);
    --mono:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--sans); color:var(--ink); min-height:100vh; min-height:100dvh;
    background:
      radial-gradient(1100px 560px at 50% -220px, rgba(46,91,255,.11), transparent 68%),
      linear-gradient(180deg, var(--bg-top), var(--bg-bot));
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  ::selection{ background:var(--accent-soft); color:var(--accent-ink); }
  .wrap{ max-width:600px; margin:0 auto; padding:56px 20px 64px; }

  /* status banner (연동 안내) */
  .banner{
    position:sticky; top:0; z-index:40; margin:-56px -20px 24px; padding:11px 18px;
    font-size:12.5px; line-height:1.5; text-align:center;
    background:#EEF4FF; border-bottom:1px solid #D5E1FF; color:#274690;
  }
  .banner.warn{ background:#FFF7ED; border-bottom-color:#FCE4C4; color:#9A5B00; }
  .banner b{ font-weight:700; }
  .banner code{ font-family:var(--mono); font-size:11.5px; background:rgba(0,0,0,.05); padding:1px 5px; border-radius:5px; }

  /* header */
  .head{ text-align:center; margin-bottom:30px; }
  .eyebrow{ display:inline-flex; align-items:center; gap:9px; font-family:var(--mono);
    font-size:11.5px; font-weight:500; letter-spacing:.2em; color:var(--muted); text-transform:uppercase; }
  .live-dot{ width:8px; height:8px; border-radius:50%; background:var(--live);
    box-shadow:0 0 0 0 rgba(255,77,77,.5); animation:pulse 2.2s ease-out infinite; }
  .wordmark{ margin:16px 0 0; font-weight:800; font-size:clamp(2rem,7.6vw,2.85rem);
    line-height:1.12; letter-spacing:-.01em; color:var(--ink); }
  .wordmark span{ display:block; }
  .bar{ width:46px; height:3px; border-radius:2px; background:var(--accent); margin:18px auto 0; }
  .sub{ margin:16px auto 0; max-width:33ch; font-size:14.5px; line-height:1.62; color:var(--muted); }

  /* list */
  .list{ display:flex; flex-direction:column; gap:12px; }
  .channel{ position:relative; display:flex; align-items:center; gap:14px; padding:16px 18px;
    background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    text-decoration:none; color:inherit; box-shadow:var(--shadow-sm);
    transition:transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease, border-color .22s ease; }
  .channel::before{ content:""; position:absolute; left:0; top:14px; bottom:14px; width:3px;
    border-radius:0 3px 3px 0; background:var(--accent); transform:scaleY(0); transform-origin:center;
    opacity:0; transition:transform .24s ease, opacity .24s ease; }
  a.channel:hover{ transform:translateY(-2px); border-color:var(--line-strong); box-shadow:var(--shadow-lift); }
  a.channel:focus-visible{ transform:translateY(-2px); border-color:var(--accent); box-shadow:var(--shadow-lift); outline:2px solid var(--accent); outline-offset:2px; }
  a.channel:hover::before, a.channel:focus-visible::before{ transform:scaleY(1); opacity:1; }
  .ch-body{ display:flex; flex-direction:column; gap:5px; min-width:0; flex:1; }
  .ch-tag{ align-self:flex-start; font-family:var(--mono); font-size:10.5px; font-weight:500;
    letter-spacing:.12em; color:var(--accent-ink); background:var(--accent-soft); padding:3px 7px; border-radius:6px; }
  .ch-title{ font-size:16.5px; font-weight:700; color:var(--ink); letter-spacing:-.004em; word-break:break-word; }
  .ch-desc{ font-size:13px; font-weight:400; line-height:1.5; color:var(--muted); word-break:break-word; }
  .ch-arrow{ flex:none; font-family:var(--mono); font-size:18px; color:var(--faint); line-height:1;
    transition:transform .24s cubic-bezier(.2,.7,.2,1), color .22s ease; }
  a.channel:hover .ch-arrow, a.channel:focus-visible .ch-arrow{ color:var(--accent); transform:translateX(4px); }

  @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(255,77,77,.45)} 70%{box-shadow:0 0 0 7px rgba(255,77,77,0)} 100%{box-shadow:0 0 0 0 rgba(255,77,77,0)} }
  @keyframes rise{ to{ opacity:1; transform:none; } }
  .head{ opacity:0; transform:translateY(10px); animation:rise .55s cubic-bezier(.2,.7,.2,1) .02s forwards; }
  .reveal{ opacity:0; transform:translateY(10px); animation:rise .5s cubic-bezier(.2,.7,.2,1) forwards; }

  .empty{ text-align:center; padding:34px 20px; border:1px dashed var(--line-strong);
    border-radius:var(--radius); color:var(--muted); font-size:14px; background:rgba(255,255,255,.5); line-height:1.6; }
  .spinner{ display:inline-block; width:15px; height:15px; border:2px solid var(--line-strong);
    border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; vertical-align:-3px; margin-right:8px; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .foot{ margin-top:34px; text-align:center; font-size:12px; line-height:1.9; color:var(--faint); }
  .foot .mk{ font-family:var(--mono); letter-spacing:.16em; color:var(--muted); }
  .refresh{ appearance:none; border:0; background:none; margin-top:6px; padding:4px 8px;
    font-family:var(--sans); font-size:11.5px; color:var(--faint); cursor:pointer; border-radius:8px; letter-spacing:.02em; }
  .refresh:hover{ color:var(--accent-ink); background:var(--accent-soft); }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
    .head,.reveal{ opacity:1; transform:none; }
    .spinner{ border-top-color:var(--line-strong); }
  }
  @media (max-width:480px){
    .wrap{ padding:42px 16px 52px; }
    .banner{ margin:-42px -16px 20px; }
    .channel{ padding:15px 16px; }
  }
</style>
</head>
<body>
<main class="wrap">

  <div class="banner" id="banner" hidden></div>

  <header class="head">
    <span class="eyebrow"><span class="live-dot"></span>Official Link Hub</span>
    <h1 class="wordmark" id="wordmark"><span>퍼블리싱팀</span><span>링크 트리</span></h1>
    <div class="bar"></div>
    <p class="sub" id="subtitle">게임 공지사항과 공식 채널을 이곳에서 한 번에 확인하세요.</p>
  </header>

  <nav class="list" id="list" aria-label="퍼블리싱팀 공식 링크">
    <div class="empty"><span class="spinner"></span>스프레드시트에서 불러오는 중…</div>
  </nav>

  <footer class="foot">
    <span class="mk">OFFICIAL CHANNELS</span><br>
    © 퍼블리싱팀 · 공식 링크 안내
    <br><button class="refresh" id="refreshBtn">↻ 새로고침</button>
  </footer>

</main>

<script>
/* =============================================================
   퍼블리싱팀 링크 트리 — Google Sheets 백엔드 (읽기 전용)

   · 링크 데이터는 아래 스프레드시트에서 관리합니다(테이블).
   · 이 페이지는 시트를 읽어 렌더링만 하며, 편집은 시트에서 합니다.
   · 시트가 원본이므로 모든 방문자에게 동일하게 보입니다.

   [설정]
   1) 가장 안정적인 방법: 스프레드시트 → 파일 → 공유 → 웹에 게시
      → 해당 시트 → CSV → 게시 → 생성된 링크를 CSV_URL 에 붙여넣기.
   2) CSV_URL 을 비워두면 SHEET_ID 로 자동 시도합니다
      (이 경우 시트를 '링크가 있는 모든 사용자: 뷰어'로 공유해야 읽힙니다).
   ============================================================= */
const CONFIG = {
  SHEET_ID: "1WgTHYODCf5DYUKYXQ5b3Lgh9hhL8O9762sd5Ra9UuRU",
  GID: "0",                 // 첫 번째 탭 = 0
  CSV_URL: "",              // (권장) 웹에 게시한 CSV 링크를 여기에 붙여넣기
  TITLE:   "퍼블리싱팀",
  TITLE2:  "링크 트리",
  SUBTITLE:"게임 공지사항과 공식 채널을 이곳에서 한 번에 확인하세요."
};

/* 시트 연결 전 미리보기용 예시 (실제 데이터는 시트에서 옵니다) */
const SAMPLE = [
  { tag:"NOTICE",    title:"공지사항",     desc:"서비스 점검·업데이트 등 주요 소식을 안내합니다.", url:"" },
  { tag:"PATCH",     title:"패치노트",     desc:"최신 버전의 변경사항과 밸런스 조정 내역.",       url:"" },
  { tag:"DISCORD",   title:"공식 디스코드", desc:"실시간 소통과 커뮤니티 이벤트에 참여하세요.",     url:"" },
  { tag:"COMMUNITY", title:"공식 커뮤니티", desc:"공략과 피드백을 나누는 유저 게시판.",           url:"" },
  { tag:"EVENT",     title:"진행 이벤트",   desc:"현재 진행 중인 이벤트와 보상을 확인하세요.",     url:"" },
  { tag:"SUPPORT",   title:"고객지원",     desc:"문의 접수·신고 및 자주 묻는 질문(FAQ).",        url:"" },
  { tag:"DOWNLOAD",  title:"게임 다운로드", desc:"공식 스토어에서 클라이언트를 내려받으세요.",     url:"" }
];

const $=(id)=>document.getElementById(id);
const listEl=$("list");
const uid=()=>"l"+Math.random().toString(36).slice(2,9);

/* ---------- 시트 읽기 ---------- */
function cb(u){ return u + (u.indexOf("?")>=0?"&":"?") + "_cb=" + Date.now(); }

async function loadFromSheet(){
  // 1) 게시된 CSV (가장 안정적)
  if(CONFIG.CSV_URL){
    try{ const r=await fetch(cb(CONFIG.CSV_URL),{cache:"no-store"});
      if(r.ok){ const rows=parseCSV(await r.text()); return {rows}; } }catch(e){}
  }
  // 2) gviz JSON (SHEET_ID, 시트를 뷰어로 공유한 경우)
  if(CONFIG.SHEET_ID){
    try{ const u=`https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&headers=1&gid=${CONFIG.GID}`;
      const r=await fetch(cb(u),{cache:"no-store"});
      if(r.ok){ const rows=parseGviz(await r.text()); if(rows) return {rows}; } }catch(e){}
  }
  // 3) export CSV (SHEET_ID)
  if(CONFIG.SHEET_ID){
    try{ const u=`https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/export?format=csv&gid=${CONFIG.GID}`;
      const r=await fetch(cb(u),{cache:"no-store"});
      if(r.ok){ const rows=parseCSV(await r.text()); return {rows}; } }catch(e){}
  }
  return null; // 실패
}

function parseCSV(text){
  text=(text||"").replace(/^\uFEFF/,"");
  const out=[]; let field="",row=[],inQ=false,i=0;
  while(i<text.length){ const c=text[i];
    if(inQ){ if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i+=2; continue; } inQ=false; i++; continue; } field+=c; i++; continue; }
    if(c==='"'){ inQ=true; i++; continue; }
    if(c===','){ row.push(field); field=""; i++; continue; }
    if(c==='\r'){ i++; continue; }
    if(c==='\n'){ row.push(field); out.push(row); row=[]; field=""; i++; continue; }
    field+=c; i++;
  }
  if(field.length||row.length){ row.push(field); out.push(row); }
  if(!out.length) return [];
  const headers=out[0].map(h=>(h||"").trim().toLowerCase());
  return out.slice(1).map(r=>{ const o={}; headers.forEach((h,idx)=>o[h]=(r[idx]!==undefined?(""+r[idx]).trim():"")); return o; });
}

function parseGviz(text){
  const k="setResponse("; const s=(text||"").indexOf(k); if(s<0) return null;
  let json=text.slice(s+k.length).replace(/\);\s*$/,"");
  let obj; try{ obj=JSON.parse(json); }catch(e){ return null; }
  const tbl=obj.table||{}; if(!tbl.rows) return null;
  const cols=(tbl.cols||[]).map(c=>((c.label||c.id||"")+"").trim().toLowerCase());
  return tbl.rows.map(r=>{ const o={}; (r.c||[]).forEach((cell,idx)=>{
    const key=cols[idx]||("col"+idx); let v = cell ? (cell.v!==null&&cell.v!==undefined? cell.v : (cell.f||"")) : "";
    o[key]=(""+v).trim(); }); return o; });
}

/* ---------- 행 → 링크 ---------- */
function pick(o,names){ for(const n of names){ if(o[n]!==undefined && (""+o[n]).trim()!=="") return (""+o[n]).trim(); } return ""; }
function enabledOf(o){
  const v = o["enabled"]!==undefined?o["enabled"] : (o["표시"]!==undefined?o["표시"] : (o["활성"]!==undefined?o["활성"]:undefined));
  if(v===undefined) return true; const s=(""+v).trim().toLowerCase();
  if(s==="") return true; return !["false","no","0","x","n","off","아니오","숨김","비활성","hide"].includes(s);
}
function normalizeUrl(u){ u=(u||"").trim(); if(!u) return "";
  if(/^javascript:/i.test(u)) return ""; if(/^(https?:\/\/|\/|#|mailto:|tel:)/i.test(u)) return u; return "https://"+u; }
function rowsToLinks(rows){
  const links=[];
  (rows||[]).forEach(o=>{
    const title=pick(o,["title","제목"]), url=pick(o,["url","link","링크","주소"]);
    if(!title && !url) return; if(!enabledOf(o)) return;
    links.push({ id:uid(), tag:pick(o,["tag","태그","label","라벨"]), title:title||"(제목 없음)",
      desc:pick(o,["desc","description","내용","설명"]), url });
  });
  return links;
}

/* ---------- 렌더 ---------- */
function renderHeader(){
  const wm=$("wordmark"); wm.innerHTML="";
  const s1=document.createElement("span"); s1.textContent=CONFIG.TITLE||""; wm.appendChild(s1);
  if((CONFIG.TITLE2||"").trim()){ const s2=document.createElement("span"); s2.textContent=CONFIG.TITLE2; wm.appendChild(s2); }
  const sub=$("subtitle"); sub.textContent=CONFIG.SUBTITLE||""; sub.style.display=(CONFIG.SUBTITLE||"").trim()?"":"none";
}
function renderLinks(links){
  listEl.innerHTML="";
  if(!links.length){ const e=document.createElement("div"); e.className="empty"; e.textContent="등록된 링크가 없습니다."; listEl.appendChild(e); return; }
  links.forEach((link,i)=>{
    const a=document.createElement("a"); a.className="channel reveal";
    const href=normalizeUrl(link.url)||"#"; a.href=href;
    if(href!=="#"){ a.target="_blank"; a.rel="noopener noreferrer"; }
    a.style.animationDelay=(0.06*i+0.08)+"s";
    const body=document.createElement("span"); body.className="ch-body";
    if((link.tag||"").trim()){ const t=document.createElement("span"); t.className="ch-tag"; t.textContent=link.tag; body.appendChild(t); }
    const ti=document.createElement("span"); ti.className="ch-title"; ti.textContent=link.title; body.appendChild(ti);
    if((link.desc||"").trim()){ const d=document.createElement("span"); d.className="ch-desc"; d.textContent=link.desc; body.appendChild(d); }
    const ar=document.createElement("span"); ar.className="ch-arrow"; ar.setAttribute("aria-hidden","true"); ar.textContent="→";
    a.appendChild(body); a.appendChild(ar); listEl.appendChild(a);
  });
}
function banner(html,warn){ const b=$("banner"); b.hidden=false; b.classList.toggle("warn",!!warn); b.innerHTML=html; }
function hideBanner(){ $("banner").hidden=true; }
function showLoading(){ listEl.innerHTML='<div class="empty"><span class="spinner"></span>스프레드시트에서 불러오는 중…</div>'; }

/* ---------- 로드 ---------- */
async function load(){
  showLoading();
  const res=await loadFromSheet();
  if(res && res.rows){
    const links=rowsToLinks(res.rows);
    if(links.length){ hideBanner(); renderLinks(links); }
    else { banner('스프레드시트는 읽었지만 표시할 링크가 없습니다. 시트에 <code>title</code>·<code>url</code> 행을 추가해 주세요.',true); renderLinks([]); }
  } else {
    // 시트를 못 읽음 → 예시 표시 + 안내
    banner('아직 스프레드시트에서 데이터를 불러오지 못했습니다. 아래는 <b>예시</b>입니다. — 시트를 <b>웹에 게시(CSV)</b>하고 <code>CSV_URL</code>에 붙여넣거나, 시트를 <b>뷰어로 공유</b>하세요.',true);
    renderLinks(rowsToLinks(SAMPLE.map(s=>({tag:s.tag,title:s.title,desc:s.desc,url:s.url}))));
  }
}

renderHeader();
$("refreshBtn").onclick=load;
load();
</script>
</body>
</html>
